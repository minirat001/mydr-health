<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>mydr 健康助手</title><link rel="icon" href="icon.svg"><link rel="shortcut icon" href="icon.svg">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes"><meta name="mobile-web-app-capable" content="yes">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:18px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:#eef1f5;color:#1e293b;line-height:1.5;padding:0 0 80px}
.hdr{background:linear-gradient(135deg,#3b82f6,#60a5fa);color:#fff;padding:14px 14px 10px;position:sticky;top:0;z-index:10}
.chip-bar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;min-height:48px}
.chip{display:inline-flex;align-items:center;padding:8px 14px;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;border:1.5px solid rgba(255,255,255,.3);background:rgba(255,255,255,.12);color:#fff;user-select:none}
.chip.active{background:#fff;color:#1e40af;border-color:#fff;font-weight:700}
.chip-add{border:1.5px dashed rgba(255,255,255,.4);background:rgba(255,255,255,.08);font-weight:500;font-size:14px;padding:8px 12px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:10px}
.sc{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:10px 4px;text-align:center}
.sc .num{font-size:24px;font-weight:700}.sc .lbl{font-size:11px;color:#94a3b8;margin-top:1px}
.sc.c1 .num{color:#3b82f6}.sc.c2 .num{color:#d97706}.sc.c3 .num{color:#dc2626}.sc.c4 .num{color:#059669}
.sec{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:14px;margin:10px}
.sec-title{font-size:16px;font-weight:700;padding-bottom:8px;border-bottom:2px solid #f1f5f9;margin-bottom:8px}
.rem-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:14px}
.rem-item:last-child{border-bottom:none}
.due{font-size:12px;padding:2px 8px;border-radius:6px;font-weight:500}
.due.green{color:#059669;background:#ecfdf5}.due.yellow{color:#d97706;background:#fffbeb}.due.red{color:#dc2626;background:#fef2f2}
.tl-row{display:flex;gap:8px;padding:6px 0;border-bottom:1px solid #f1f5f9;font-size:14px}
.tl-row:last-child{border-bottom:none}.tl-time{font-weight:700;color:#3b82f6;width:46px;flex-shrink:0}
.tl-sep{font-size:13px;font-weight:600;color:#94a3b8;padding:6px 0 2px}
.tl-note{font-size:12px;color:#94a3b8;display:block}
.dx-hdr{display:flex;align-items:center;padding:8px 0;font-size:15px;font-weight:600;color:#475569;cursor:pointer}
.dx-hdr .count{font-size:12px;color:#94a3b8;margin-left:auto}
.dx-items{padding:2px 0 4px 10px}.dx-items.hidden{display:none}
.dx-item{font-size:14px;padding:4px 0;display:flex;gap:6px;align-items:center}
.dx-status{font-size:11px;padding:1px 8px;border-radius:4px;font-weight:600}
.dx-status.med{color:#3b82f6;background:#eff6ff}.dx-status.follow{color:#8b5cf6;background:#f5f3ff}
.dx-status.stable{color:#059669;background:#ecfdf5}
.ind-item{display:flex;gap:6px;padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:14px;align-items:center}
.ind-item:last-child{border-bottom:none}.ind-name{flex:1;font-weight:500}.ind-val{font-weight:700;font-size:15px}
.ind-unit{font-size:12px;color:#94a3b8}.ind-ass{font-size:13px;font-weight:600;margin-left:4px}
.ind-ass.high{color:#dc2626}.ind-ass.low{color:#d97706}.ind-ass.normal{color:#059669}
.empty{padding:50px 20px;text-align:center;color:#94a3b8}.empty div{font-size:40px;margin-bottom:10px}
.empty h2{font-size:18px;color:#1e293b;margin-bottom:6px}.empty p{font-size:14px}
.empty-text{text-align:center;color:#94a3b8;padding:12px;font-size:13px}
.footer-text{text-align:center;font-size:12px;color:#94a3b8;padding:6px}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;z-index:100;opacity:0;pointer-events:none;transition:opacity .3s}
.toast.show{opacity:1}
.bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e2e8f0;padding:8px 10px;display:flex;gap:6px;z-index:20}
.bar .b{flex:1;padding:10px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;text-align:center;border:none}
.bar .primary{background:#3b82f6;color:#fff}.bar .secondary{background:#f1f5f9;color:#475569;border:1px solid #e2e8f0}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:50;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:14px 14px 0 0;width:100%;max-height:80vh;overflow-y:auto;padding:16px 16px 30px}
.modal-title{font-size:17px;font-weight:700;margin-bottom:10px}
.modal-close{float:right;width:32px;height:32px;border:none;background:#f1f5f9;border-radius:50%;font-size:16px;cursor:pointer}
textarea{width:100%;min-height:100px;padding:12px;border:2px solid #e2e8f0;border-radius:8px;font-size:14px;font-family:inherit;resize:vertical;outline:none;box-sizing:border-box}
button.parse-btn{width:100%;padding:12px;background:#3b82f6;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px}
input{width:100%;padding:12px;border:2px solid #e2e8f0;border-radius:8px;font-size:15px;outline:none;margin-bottom:10px;box-sizing:border-box}
input:focus{border-color:#3b82f6}
.guide{font-size:13px;color:#64748b;margin-bottom:10px;padding:8px 12px;background:#f8faff;border:1px solid #dbeafe;border-radius:8px;line-height:1.5}
</style>
</head>
<body>
<div class="hdr"><div class="chip-bar" id="cb"><span class="chip chip-add" id="ba">+ 添加</span></div></div>
<div class="toast" id="tt"></div>
<div id="main"></div>
<div class="bar"><button class="b secondary" id="bi">📋 粘贴</button><button class="b secondary" id="be">📄 导出</button><button class="b primary" id="bc">📝 问询模板</button></div>

<div class="modal-overlay" id="mn">
<div class="modal"><button class="modal-close" id="mnc">&times;</button>
<div class="modal-title">➕ 添加患者</div>
<input id="in" type="text" placeholder="输入患者姓名...">
<div style="display:flex;gap:6px">
<button class="parse-btn" id="bnc" style="background:#e2e8f0;color:#475569;flex:1;font-size:15px">取消</button>
<button class="parse-btn" id="bnf" style="flex:2">✔ 确定</button>
</div></div></div>

<div class="modal-overlay" id="mi">
<div class="modal"><button class="modal-close" id="mic">&times;</button>
<div class="modal-title">📋 粘贴 DeepSeek 回复</div>
<div class="guide">① 点下方"📝问询模板"→ 复制 → 去 DeepSeek 粘贴发送<br>② DeepSeek 回复后 → 长按 → 复制全部<br>③ 回到本页 → 粘贴到下方 → 点"解析"</div>
<textarea id="it" placeholder="长按 DeepSeek 回复，选择「复制」，然后回到这里粘贴..."></textarea>
<button id="bp" class="parse-btn">📥 解析数据</button>
</div></div>

<script src="app.js"></script>
</body>
</html>
